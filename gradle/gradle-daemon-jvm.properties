#This file was generated by updateDaemonJvm; the toolchainUrl.* download entries were
#removed on purpose. They pointed at api.foojay.io, so a build would fetch a JDK over the
#network — which breaks a reproducible/offline build (F-Droid) and can resolve a different
#JDK than the developer used. Gradle now runs the daemon on an already-installed JDK 21.
toolchainVersion=21
