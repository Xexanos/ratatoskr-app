# Post-merge validation of the shrunk build (SPEC sections 8 and 9), on every push to main:
#
#   1. Build the `minified` variant - the release R8 configuration, but debug-signed and
#      debuggable so instrumentation can attach - and run the whole-app integration flow
#      (AppFlowTest) plus the wire-level smoke mirror (MinifiedWireSmokeTest) against it on
#      an API 36 emulator. This is the on-device proof that shrinking kept everything the
#      app needs (Moshi codegen adapters, Retrofit interfaces, Compose navigation).
#   2. On success, publish the tested APKs to a per-commit `testing-<short-sha>` pre-release:
#      the debug-signed minified APK (installable - what the black-box E2E harness drives)
#      and the unsigned release APK (what F-Droid signs). Each validated commit gets its own
#      pre-release so a given build stays retrievable by its commit; the `testing-` prefix and
#      prerelease flag make clear these are throwaway, not stable releases.
#   3. Then dispatch the cross-component E2E suite (Xexanos/ratatoskr-e2e) with this build's
#      pre-release tag. On a green E2E run it dispatches `app-e2e-passed` back, which drives
#      promote.yml - the git-tag release gate (a v<versionName> tag is cut only for a version
#      not yet released). Mirrors the server's container.yml -> E2E -> promote.yml flow.
#
# A separate scheduled job prunes `testing-*` pre-releases (and their tags) older than the
# retention window below, so the per-commit releases do not accumulate forever.
#
# This runs post-merge rather than per PR (a deliberate cost trade-off; the per-PR gate is
# assembleRelease + assembleMinifiedAndroidTest in ci.yml for R8 config / keep-rule errors
# on the JVM, plus the on-device test-minified-smoke job in instrumented-tests.yml for the
# runtime resolution gaps a JVM build cannot see - only the full AppFlowTest against the
# shrunk build waits for post-merge). paths-ignore is the same docs/metadata denylist the
# other workflows use.

name: Release validation

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'fastlane/**'
      - '.gitignore'
      - 'LICENSE'
  # Daily prune of stale testing-* pre-releases (see the cleanup job).
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:

permissions:
  # Needed to create the per-commit testing-* pre-releases and their tags, and to delete
  # stale ones in the scheduled cleanup job.
  contents: write

concurrency:
  # Scope by event so the scheduled cleanup and a push validation never cancel each other.
  # Within pushes, a newer main push still supersedes an in-flight validation of an older
  # commit. Each successful run publishes to its own testing-<sha> release, so a cancellation
  # can at worst leave one commit's release half-populated - never a mix across commits.
  group: release-validation-${{ github.event_name }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  validate-and-publish:
    name: Validate the shrunk build & publish the pre-release
    # The scheduled trigger is only for the cleanup job below; skip the heavy validation then.
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    # On main this is permanently the cold path: nothing warms the AVD snapshot in-scope
    # (the restore below is best-effort), so every run pays AVD creation + cold boot on top
    # of two R8 builds (minified + release) and two instrumented suites. 45m leaves headroom.
    timeout-minutes: 45

    steps:
      - name: Check out (with the contract submodule)
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Enable KVM for the emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # Restore-only (NOT actions/cache@v4): this job must never SAVE under the shared key.
      # instrumented-tests.yml runs on pull_request, so its warm snapshots live in PR-scoped
      # cache entries that main cannot read - this restore therefore always misses on main,
      # and the emulator boots snapshot-less (-no-snapshot-save). A full actions/cache here
      # would then save that cold, snapshot-less AVD under the default-branch-scoped key that
      # every PR's warm-avd job reads, giving those jobs a cross-scope exact-key hit that
      # skips warming forever (keys are immutable). Restore-only closes that off; the runner
      # just creates the AVD itself here (slower, acceptable post-merge).
      - name: Restore the warmed AVD snapshot (best-effort)
        uses: actions/cache/restore@v6
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api36-x86_64-default-pixel_6

      - name: Run the integration flow against the minified build
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          arch: x86_64
          target: default
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          # -PminifiedTests switches the instrumented target to the `minified` build type
          # (see app/build.gradle.kts). The crashpad reaping mirrors instrumented-tests.yml
          # (android-emulator-runner#385).
          script: |
            ./gradlew -PminifiedTests :app:connectedMinifiedAndroidTest -Pandroid.testInstrumentationRunnerArguments.class=io.github.xexanos.ratatoskr.ui.AppFlowTest,io.github.xexanos.ratatoskr.ui.MinifiedWireSmokeTest
            pkill -f -SIGTERM '[c]rashpad_handler' || true
            sleep 5
            pkill -f -SIGKILL '[c]rashpad_handler' || true

      - name: Upload the test reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: release-validation-test-reports
          path: |
            app/build/reports/androidTests/connected
            app/build/outputs/androidTest-results/connected
          retention-days: 14

      - name: Build the unsigned release APK
        run: ./gradlew --no-daemon :app:assembleRelease

      - name: Collect the APKs under stable names
        run: |
          mkdir -p publish
          cp app/build/outputs/apk/minified/app-minified.apk publish/ratatoskr-minified.apk
          cp app/build/outputs/apk/release/app-release-unsigned.apk publish/ratatoskr-release-unsigned.apk

      - name: Derive the per-commit release tag
        id: tag
        run: echo "name=testing-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      # Per-commit pre-release: each validated main commit gets its own testing-<short-sha>
      # release and fresh tag at that commit. Because the tag is new every run, it always
      # resolves to the commit it names (no stale-tag problem), and assets are never shared
      # across commits (no mixed-generation payload). The scheduled cleanup job prunes these.
      # Guarded to main so a workflow_dispatch from a branch cannot publish branch-built APKs
      # (its own concurrency group would otherwise let it escape superseding entirely).
      - name: Publish the validated APKs to a per-commit testing pre-release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          target_commitish: ${{ github.sha }}
          name: Testing build ${{ steps.tag.outputs.name }}
          prerelease: true
          body: |
            Automatically published by the release-validation workflow. This is a throwaway
            testing build, not a stable release; it is pruned by the scheduled cleanup job.

            Commit: ${{ github.sha }}

            - `ratatoskr-minified.apk` - R8-shrunk, debug-signed, installable; validated
              on-device by the instrumented integration suite. This is the artifact the
              black-box E2E harness drives.
            - `ratatoskr-release-unsigned.apk` - the unsigned release build (F-Droid signs
              its own).
          files: |
            publish/ratatoskr-minified.apk
            publish/ratatoskr-release-unsigned.apk

      # Hand this validated build to the cross-component E2E suite (Xexanos/ratatoskr-e2e).
      # The dispatch carries the per-commit pre-release tag (the APK it just published, which the
      # E2E harness pulls) and the commit. E2E runs server@release-:latest x app@THIS build; on a
      # green run it dispatches `app-e2e-passed` back here, which drives promote.yml (the git-tag
      # release gate). Mirrors the server's container.yml -> E2E -> promote.yml flow, one direction
      # per component. Cross-repo dispatch needs a PAT with access to ratatoskr-e2e (the per-run
      # GITHUB_TOKEN is scoped to THIS repo only), stored as E2E_DISPATCH_TOKEN. If that secret is
      # missing the step FAILS: the testing APKs are published but their E2E gate silently not
      # running would be worse than a red pipeline (same stance as the server's trigger-e2e).
      - name: Trigger the cross-component E2E suite
        if: github.ref == 'refs/heads/main'
        env:
          E2E_DISPATCH_TOKEN: ${{ secrets.E2E_DISPATCH_TOKEN }}
          RELEASE_TAG: ${{ steps.tag.outputs.name }}
          SHA: ${{ github.sha }}
        run: |
          if [ -z "$E2E_DISPATCH_TOKEN" ]; then
            echo "::error title=E2E dispatch failed::E2E_DISPATCH_TOKEN is not set - cannot trigger the E2E suite for ${RELEASE_TAG}. Add the secret (a PAT with access to ratatoskr-e2e)." >&2
            exit 1
          fi
          echo "Dispatching app-validated E2E for ${RELEASE_TAG} (${SHA})"
          GH_TOKEN="$E2E_DISPATCH_TOKEN" gh api \
            repos/${{ github.repository_owner }}/ratatoskr-e2e/dispatches \
            -f event_type=app-validated \
            -F "client_payload[release_tag]=${RELEASE_TAG}" \
            -F "client_payload[commit]=${SHA}"

  # Prune the per-commit testing-* pre-releases so they do not accumulate forever. Runs only
  # on the daily schedule (or a manual dispatch); deletes any testing-* pre-release older than
  # the retention window, together with its tag. A safety floor keeps the most recent few so
  # there is always something for the E2E harness to fetch even during a quiet spell.
  cleanup-testing-releases:
    name: Prune stale testing pre-releases
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Delete testing-* pre-releases older than the retention window
        env:
          GH_TOKEN: ${{ github.token }}
          RETENTION_DAYS: '14'
          KEEP_MOST_RECENT: '3'
        run: |
          set -euo pipefail
          cutoff=$(date -u -d "${RETENTION_DAYS} days ago" +%s)
          # Newest first; skip the KEEP_MOST_RECENT safety floor, then delete the rest older
          # than the cutoff. --cleanup-tag removes the git tag along with the release.
          gh release list --repo "$GITHUB_REPOSITORY" --limit 200 \
            --json tagName,createdAt,isPrerelease \
            --jq "[.[] | select(.isPrerelease and (.tagName | startswith(\"testing-\")))]
                  | sort_by(.createdAt) | reverse | .[${KEEP_MOST_RECENT}:] | .[]
                  | [.tagName, .createdAt] | @tsv" \
            | while IFS=$'\t' read -r tag created; do
                created_epoch=$(date -u -d "$created" +%s)
                if [ "$created_epoch" -lt "$cutoff" ]; then
                  echo "Deleting stale pre-release $tag (created $created)"
                  gh release delete "$tag" --repo "$GITHUB_REPOSITORY" --cleanup-tag --yes
                else
                  echo "Keeping $tag (created $created, within retention window)"
                fi
              done
