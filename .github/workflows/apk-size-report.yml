# TEMPORARY: one-off APK size comparison to evaluate the resource shrinker (F-Droid cautions
# against it unless it saves meaningfully). Builds the release APK in three shrink configs and
# writes a size table to the run summary. Manual trigger only; remove after measuring.
name: APK size report (temporary)

on:
  # Push-triggered on this branch only: a brand-new workflow file cannot be reached via
  # workflow_dispatch (that needs it on the default branch). Removed with the rest of this
  # temporary job once the numbers are recorded.
  push:
    branches: [claude/spec-review-planning-phsif5]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  size:
    name: Measure release APK size across shrink configs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out (with the contract submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up the Android SDK
        uses: android-actions/setup-android@v3

      - name: Build the three release configurations
        run: |
          set -eux
          build() {  # $1 = label, $2.. = extra gradle props
            local label="$1"; shift
            rm -f app/build/outputs/apk/release/app-release-unsigned.apk
            ./gradlew --no-daemon --rerun-tasks :app:assembleRelease "$@"
            cp app/build/outputs/apk/release/app-release-unsigned.apk "$RUNNER_TEMP/$label.apk"
          }
          build unshrunk         -Pr8=off
          build code-only        -PresShrink=off
          build code-plus-res

      - name: Print size table
        run: |
          {
            echo "## Release APK size by shrink configuration"
            echo
            echo "| Configuration | Bytes | Human |"
            echo "|---|---:|---:|"
            for f in unshrunk code-only code-plus-res; do
              bytes=$(stat -c%s "$RUNNER_TEMP/$f.apk")
              printf '| %s | %s | %s |\n' "$f" "$bytes" "$(numfmt --to=iec --suffix=B "$bytes")"
            done
          } | tee -a "$GITHUB_STEP_SUMMARY"
