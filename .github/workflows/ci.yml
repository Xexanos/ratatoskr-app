name: CI

# Builds the app and runs the unit tests, so a change can't merge without compiling and
# passing tests. push builds only main; every pull request builds its head. Feature-branch
# work is covered by its PR - a branch with no open PR does not build. Scoping push to main
# is deliberate: a push to a PR branch would otherwise fire BOTH the push and pull_request
# events and build the same commit twice (leaving a cancelled duplicate run on the PR).
# Free-software toolchain only (SPEC section 8): official GitHub-hosted runner, Temurin
# JDK, Gradle wrapper - no proprietary SDKs.
#
# paths-ignore is a denylist, not an allowlist: the run is skipped only when *every*
# changed file is docs/metadata that can't affect the build or tests. Anything else -
# including any new or unlisted path - still triggers CI, so this can never silently
# skip a real code change. (Note: if CI is later made a required check with branch
# protection, a docs-only PR would show no CI run; use a companion always-pass job then.)
on:
  push:
    branches: [main]
    paths-ignore: &docs-only
      - '**/*.md'
      - 'docs/**'
      - 'fastlane/**'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    paths-ignore: *docs-only

permissions:
  contents: read

concurrency:
  # push (main) and pull_request no longer fire for the same commit, so there is no push/PR
  # duplicate to collapse here; this just cancels a superseded run when new commits land in
  # quick succession on the same PR (or on main).
  group: ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & unit test
    runs-on: ubuntu-latest
    steps:
      - name: Check out (with the contract submodule)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # The Kotlin client is generated at build time from the pinned contract
          # submodule (SPEC section 4), so the build needs it checked out.
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        # Caches Gradle and validates the wrapper jar against known-good checksums,
        # complementing the pinned distributionSha256Sum in gradle-wrapper.properties.
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Set up the Android SDK
        # Provides cmdline-tools and accepts the SDK licences so AGP can provision the
        # compileSdk platform and build-tools it needs.
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2

      - name: UX guardrails
        run: bash scripts/check-ux.sh

      - name: Lint, assemble debug and run unit tests
        run: ./gradlew --no-daemon lintDebug testDebugUnitTest assembleDebug :app:assembleRelease

      - name: Run R8 on the minified app + instrumented-test APKs (JVM, no emulator)
        # assembleMinifiedAndroidTest runs R8 on BOTH the minified app APK
        # (minifyMinifiedWithR8) and the instrumented-test APK (minifyMinifiedAndroidTestWithR8).
        # The latter is the one assembleMinified alone never builds, so a missing-class / keep
        # rule error in the test APK's R8 (e.g. test-only deps referencing compile-time-only
        # classes) is caught here per PR instead of only in release-validation.yml post-merge.
        # -PminifiedTests switches testBuildType to `minified` so the task exists.
        # This JVM run only proves the R8 *config* is sound; runtime resolution gaps (classes
        # the test APK resolves from the shrunk app APK only at runtime) are invisible here
        # and are covered per PR by test-minified-smoke in instrumented-tests.yml.
        run: ./gradlew --no-daemon -PminifiedTests :app:assembleMinifiedAndroidTest
