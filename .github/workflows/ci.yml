name: CI

# Builds the app and runs the unit tests on every push to the mainline branches
# and on every pull request, so a change can't merge without compiling and passing
# tests. Free-software toolchain only (SPEC section 8): official GitHub-hosted runner,
# Temurin JDK, Gradle wrapper — no proprietary SDKs.
on:
  push:
    branches: [main, scaffolding]
  pull_request:

permissions:
  contents: read

concurrency:
  # Cancel superseded runs for the same ref so a rapid push sequence doesn't queue up.
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & unit test
    runs-on: ubuntu-latest
    steps:
      - name: Check out (with the contract submodule)
        uses: actions/checkout@v4
        with:
          # The Kotlin client is generated at build time from the pinned contract
          # submodule (SPEC section 4), so the build needs it checked out.
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        # Caches Gradle and validates the wrapper jar against known-good checksums,
        # complementing the pinned distributionSha256Sum in gradle-wrapper.properties.
        uses: gradle/actions/setup-gradle@v4

      - name: Set up the Android SDK
        # Provides cmdline-tools and accepts the SDK licences so AGP can provision the
        # compileSdk platform and build-tools it needs.
        uses: android-actions/setup-android@v3

      - name: Assemble debug and run unit tests
        run: ./gradlew --no-daemon assembleDebug testDebugUnitTest
