name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with contract submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: UX guardrails
        run: bash scripts/check-ux.sh

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Lint, test and build
        run: ./gradlew --no-daemon lintDebug test assembleDebug
